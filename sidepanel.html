<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FS文档导出器 (开源版)</title>
  <style>
    :root {
      --bg: linear-gradient(165deg, #f6f8ff 0%, #ecf5ff 45%, #f8fafc 100%);
      --panel: #ffffff;
      --panel-border: #d8e2f1;
      --text: #0f172a;
      --muted: #475569;
      --brand: #005f8f;
      --brand-2: #0284c7;
      --ok: #0f766e;
      --warn: #b45309;
      --err: #b91c1c;
      --run: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Noto Sans SC", "Microsoft YaHei UI", "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .layout {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: panel-enter 220ms ease-out;
    }

    @keyframes panel-enter {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 5px 16px rgba(15, 23, 42, 0.08);
    }

    .title {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #94a3b8;
      transition: background-color 160ms ease-in-out;
    }

    .dot.running {
      background: var(--run);
    }

    .dot.success {
      background: var(--ok);
    }

    .dot.warning {
      background: var(--warn);
    }

    .dot.error {
      background: var(--err);
    }

    .field {
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .field strong {
      color: var(--text);
      margin-right: 6px;
    }

    .field a {
      color: var(--brand-2);
      word-break: break-all;
      text-decoration: none;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .input-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 9px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .input:focus {
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.14);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: 9px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: transform 120ms ease, box-shadow 140ms ease, opacity 140ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(2, 132, 199, 0.2);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn.primary {
      color: #fff;
      background: linear-gradient(120deg, var(--brand) 0%, var(--brand-2) 100%);
    }

    .btn.secondary {
      color: #083344;
      background: linear-gradient(120deg, #cffafe 0%, #bae6fd 100%);
    }

    .log-list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 240px;
      overflow: auto;
      display: grid;
      gap: 8px;
    }

    .log-item {
      border-left: 3px solid #cbd5e1;
      padding: 7px 8px;
      border-radius: 6px;
      background: #f8fafc;
      font-size: 12px;
      line-height: 1.4;
    }

    .log-item.running {
      border-left-color: var(--run);
    }

    .log-item.success {
      border-left-color: var(--ok);
    }

    .log-item.warning {
      border-left-color: var(--warn);
    }

    .log-item.error {
      border-left-color: var(--err);
    }

    .log-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .result {
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
      word-break: break-word;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .btn-mini {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #334155;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-mini:hover {
      color: inherit;
    }

    .author-footer {
      margin-top: auto;
      padding-top: 16px;
      text-align: center;
    }

    .author-info {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: var(--muted);
      background: #f8fafc;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.8), 0 1px 2px rgba(15, 23, 42, 0.03);
    }

    .author-badge strong {
      color: var(--brand);
      font-weight: 600;
    }

    .version-tag {
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
      color: #334155;
    }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="logo-box">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 011.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      </svg>
    </div>
    <h1 class="app-title"><span id="statusDot" class="dot"></span>FS文档导出器</h1>
  </header>
  <main class="layout">
    <section class="card">
      <div class="field"><strong>标题</strong><span id="pageTitle">-</span></div>
      <div class="field"><strong>类型</strong><span id="pageType">-</span></div>
      <div class="field"><strong>链接</strong><a id="pageUrl" href="#" target="_blank" rel="noopener noreferrer">-</a>
      </div>
    </section>

    <section class="card controls">
      <label class="input-label">
        下载子目录（默认 download）
        <input id="pathInput" class="input" value="download" placeholder="download">
      </label>
      <div class="btn-grid">
        <button id="exportMarkdown" class="btn primary">导出 Markdown</button>
        <button id="exportHtml" class="btn primary">导出 HTML</button>
        <button id="exportDocx" class="btn primary">导出 DOCX</button>
        <button id="exportPdf" class="btn secondary">导出 PDF</button>
        <button id="exportBitableJson" class="btn secondary">导出 Bitable JSON</button>
        <button id="exportBitableCsv" class="btn secondary">导出 Bitable CSV</button>
        <button id="exportBitableXlsx" class="btn secondary">导出 Bitable XLSX</button>
      </div>
    </section>

    <section class="card">
      <div class="title-row">
        <h2 class="title">导出进度</h2>
        <button id="clearProgressBtn" class="btn-mini" type="button">清除进度</button>
      </div>
      <ul id="logList" class="log-list"></ul>
    </section>

    <section class="card result" id="resultBox">
      暂无导出结果。
    </section>
    <footer class="author-footer">
      <div class="author-info">
        <span class="author-badge">✦ Made by <strong>Ray</strong></span>
        <span class="version-tag">v0.1.0</span>
      </div>
    </footer>
  </main>

  <script type="module" src="sidepanel.js"></script>
</body>

</html>
